[package]
name = "bitcoin_simulation"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "btc-server"
path = "src/bin/server.rs"

[[bin]]
name = "btc-demo"
path = "src/main.rs"

[dependencies]
md5 = "0.7"
sha2 = "0.10"
hex = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rand = "0.8"
tokio = { version = "1", features = ["full"] }
axum = "0.7"
tower = "0.5"
tower-http = { version = "0.6", features = ["cors"] }

[lib]
name = "bitcoin_simulation"
path = "src/lib.rs"